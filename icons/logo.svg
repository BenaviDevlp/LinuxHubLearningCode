<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="BenaviDev">
  <defs>
    <linearGradient id="bdGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#3b7a2a"/>
      <stop offset="1" stop-color="#6fbf4f"/>
    </linearGradient>
  </defs>
  <!-- Fondo tipo app/terminal -->
  <rect x="2" y="2" width="60" height="60" rx="16" fill="url(#bdGrad)"/>
  <rect x="2.75" y="2.75" width="58.5" height="58.5" rx="15.25" fill="none" stroke="#ffffff" stroke-opacity="0.22" stroke-width="1.5"/>
  <!-- Prompt de terminal: > -->
  <polyline points="18,21 31,32 18,43" fill="none" stroke="#0e2a08" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cursor: _ -->
  <rect x="35" y="38" width="13" height="5.5" rx="2.75" fill="#0e2a08"/>
</svg>
